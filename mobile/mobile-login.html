<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход — Мой Не Сам</title>
    <link rel="stylesheet" href="mobile-style.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span class="time">9:41</span>
            <span class="status-icons">📶 🔋</span>
        </div>

        <div class="app-header">
            <span></span>
            <h1>🌊 Мой Не Сам</h1>
            <span></span>
        </div>

        <div class="phone-content">
            <div style="text-align:center; padding: 20px 0 10px;">
                <div style="font-size:3rem; margin-bottom:8px;">🧹</div>
                <h2 style="color:#1a3d4e; font-size:1.2rem; font-weight:600;">С возвращением!</h2>
                <p style="color:#5a8a9a; font-size:0.82rem; margin-top:4px;">Войдите, чтобы управлять заявками</p>
            </div>

            <div class="card">
                <form id="login-form">
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" placeholder="Введите пароль" required>
                    </div>
                    <p class="error-msg" style="display:none;">Неверный логин или пароль</p>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </form>
            </div>

            <div class="divider">или</div>

            <a href="mobile-register.html" class="btn btn-outline" style="display:block; width:100%;">Создать аккаунт</a>
        </div>

        <div class="bottom-nav">
            <a href="mobile-register.html" class="nav-item">
                <span class="icon">📝</span>
                <span>Регистрация</span>
            </a>
            <a href="mobile-login.html" class="nav-item active">
                <span class="icon">🔑</span>
                <span>Вход</span>
            </a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = function(e) {
            e.preventDefault();
            var err = document.querySelector('#login-form .error-msg');
            var login = this.querySelectorAll('input')[0].value;
            var pass = this.querySelectorAll('input')[1].value;
            if (login === 'adminka' && pass === 'password') {
                window.location.href = 'mobile-admin.html';
            } else if (login && pass) {
                window.location.href = 'mobile-create-order.html';
            } else {
                err.style.display = 'block';
                err.textContent = 'Заполните все поля';
            }
        };
    </script>
</body>
</html>
