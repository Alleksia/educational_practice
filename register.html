<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Мой Не Сам</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧹 Мой Не Сам</h1>
        <nav>
            <a href="login.html">Вход</a>
            <a href="register.html" class="active">Регистрация</a>
        </nav>
    </header>
    <main>
        <section>
            <div class="card">
                <h2>Регистрация нового пользователя</h2>
                <form id="form-register">
                    <div class="form-group"><label for="reg-fio">ФИО *</label><input id="reg-fio" required></div>
                    <div class="row">
                        <div class="form-group"><label for="reg-phone">Телефон *</label><input id="reg-phone" type="tel" required></div>
                        <div class="form-group"><label for="reg-email">Email *</label><input id="reg-email" type="email" required></div>
                    </div>
                    <div class="row">
                        <div class="form-group"><label for="reg-login">Логин *</label><input id="reg-login" required></div>
                        <div class="form-group"><label for="reg-pass">Пароль *</label><input id="reg-pass" type="password" required></div>
                    </div>
                    <button type="submit" class="primary">Зарегистрироваться</button>
                    <p class="error-msg" id="reg-error"></p>
                </form>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
<script>
    document.getElementById('form-register').onsubmit = async function(e) {
        e.preventDefault();
        const errEl = document.getElementById('reg-error');
        const btn = this.querySelector('button');

        const data = {
            fio: document.getElementById('reg-fio').value.trim(),
            phone: document.getElementById('reg-phone').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            login: document.getElementById('reg-login').value.trim(),
            password: document.getElementById('reg-pass').value.trim()
        };

        if (!data.fio || !data.phone || !data.email || !data.login || !data.password) {
            errEl.textContent = 'Все поля обязательны';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Регистрация...';

        try {
            await API.register(data);
            window.location.href = '/orders';
        } catch (err) {
            errEl.textContent = err.message;
            btn.disabled = false;
            btn.textContent = 'Зарегистрироваться';
        }
    };
</script>
</body>
</html>
